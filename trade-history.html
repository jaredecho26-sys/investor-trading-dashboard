<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade History - Trading Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0F172A;
            color: #E2E8F0;
            padding: 16px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #334155;
        }
        
        .header-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .back-link {
            padding: 8px 16px;
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #E2E8F0;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .back-link:hover {
            background: #334155;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1E293B;
            border-radius: 8px;
            overflow: hidden;
        }
        
        thead {
            background: #0F172A;
            border-bottom: 1px solid #334155;
        }
        
        th {
            text-align: left;
            padding: 16px;
            font-size: 11px;
            font-weight: 600;
            color: #94A3B8;
            text-transform: uppercase;
        }
        
        td {
            padding: 16px;
            border-bottom: 1px solid #334155;
            font-size: 12px;
        }
        
        tr:hover {
            background: #334155;
        }
        
        .positive {
            color: #10B981;
        }
        
        .negative {
            color: #EF4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="header-title">Trade History</div>
            </div>
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Close Date</th>
                    <th>Symbol</th>
                    <th>Net P&L</th>
                </tr>
            </thead>
            <tbody>
                
            </tbody>
        </table>
    </div>
</body>
</html>
